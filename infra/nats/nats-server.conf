# DarkIron NATS Server Configuration
# Used for local development and staging.
# Production config lives in infra/k8s/nats/

server_name: darkiron
port: 4222
http_port: 8222

websocket {
    port: 9222
    no_tls: true
}

jetstream {
    store_dir: /data
    max_mem: 256MB
    max_file: 1GB
}

debug: false
trace: false
logtime: true
