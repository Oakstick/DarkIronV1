apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkiron-runtime
  namespace: darkiron
  labels:
    app.kubernetes.io/name: runtime
    app.kubernetes.io/part-of: darkiron
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime
    spec:
      initContainers:
        # Wait for NATS to be ready before starting runtime
        - name: wait-for-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z nats 4222; do echo "Waiting for NATS..."; sleep 2; done']
      containers:
        - name: runtime
          image: ghcr.io/oakstick/darkironv1/runtime:${IMAGE_TAG}
          env:
            - name: NATS_URL
              value: nats://nats:4222
            - name: RUST_LOG
              value: info,darkiron=debug
            - name: DARKIRON_ASSETS
              value: /app/assets
            - name: DARKIRON_STARTUP_DELAY_MS
              value: "2000"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["test", "-f", "/proc/1/status"]
            initialDelaySeconds: 10
            periodSeconds: 30

