name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust ─────────────────────────────────────────────
  rust-check:
    name: Rust (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace
        env:
          NATS_URL: ""  # Skip integration tests that need NATS

      - name: Build release
        run: cargo build --workspace --release

  # ─── TypeScript ───────────────────────────────────────
  typescript-check:
    name: TypeScript (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm biome check packages/

      - name: TypeScript typecheck
        run: pnpm -r run typecheck
        continue-on-error: true  # Some packages may not have typecheck script yet

      - name: Build editor
        run: pnpm -r run build
        continue-on-error: true  # Build may fail without full setup

  # ─── Integration (requires NATS) ─────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [rust-check, typescript-check]
    services:
      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
          - 9222:9222
        options: >-
          --health-cmd "nats-server --help || true"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Run integration tests
        run: cargo test --workspace -- --include-ignored
        env:
          NATS_URL: nats://localhost:4222

